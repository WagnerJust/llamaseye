name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test before release
        run: go test ./...

      - name: Build binaries
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux  GOARCH=amd64  go build -ldflags="${LDFLAGS}" -o dist/llamaseye-linux-amd64   .
          GOOS=linux  GOARCH=arm64  go build -ldflags="${LDFLAGS}" -o dist/llamaseye-linux-arm64   .
          GOOS=darwin GOARCH=amd64  go build -ldflags="${LDFLAGS}" -o dist/llamaseye-darwin-amd64  .
          GOOS=darwin GOARCH=arm64  go build -ldflags="${LDFLAGS}" -o dist/llamaseye-darwin-arm64  .

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python3 - <<'EOF'
          import re, os
          with open('CHANGELOG.md') as f:
              content = f.read()
          blocks = re.split(r'(?=^## \[)', content, flags=re.MULTILINE)
          latest = next(b for b in blocks if b.startswith('## ['))
          body = latest.split('\n', 1)[1].strip().rstrip('-').strip()
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f'notes<<ENDOFNOTES\n{body}\nENDOFNOTES\n')
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.notes.outputs.notes }}
